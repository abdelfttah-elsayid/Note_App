name: note_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-113.1.beta

dependencies:
  flutter_bloc: ^9.1.1
  flutter:
    sdk: flutter
  font_awesome_flutter: ^11.0.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  build_runner: ^2.4.8
  hive_generator: ^2.0.1
flutter:
  uses-material-design: true

  # 1. قسم الصور والأيقونات (Assets)
#  assets:
  #  - assets
    # - assets/icons/telegram_outline.svg

  # 2. قسم الخطوط (Fonts)
  # تأكد من وجود الملف في assets/fonts/Montserrat-Regular.ttf
  fonts:
    - family: MontserratSemi
      fonts:
        - asset: assets/fonts/Montserrat-SemiBold.ttf
    - family: MontserratBold
      fonts:
        - asset: assets/fonts/Montserrat-ExtraBoldItalic.ttf
